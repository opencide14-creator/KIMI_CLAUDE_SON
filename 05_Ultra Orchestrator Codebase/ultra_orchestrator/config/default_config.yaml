  key: ${KIMI_KEY_1}
  tier: coding
  max_tokens_per_minute: 200000
  max_requests_per_minute: 60
  priority: 1
- id: KEY_2
  key: ${KIMI_KEY_2}
  tier: coding
  max_tokens_per_minute: 200000
  max_requests_per_minute: 60
  priority: 2
- id: KEY_3
  key: ${KIMI_KEY_3}
  tier: coding
  max_tokens_per_minute: 200000
  max_requests_per_minute: 60
  priority: 3
- id: KEY_4
  key: ${KIMI_KEY_4}
  tier: coding
  max_tokens_per_minute: 200000
  max_requests_per_minute: 60
